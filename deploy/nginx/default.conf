server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/low-level-cache-tejas.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/low-level-cache-tejas.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;

    resolver 127.0.0.11 ipv6=off valid=10s;

    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location / {
        set $cache_upstream current-cache_http-1:8080;
        proxy_pass http://$cache_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
}