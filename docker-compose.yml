services:
  cache_http:
    image: ghcr.io/${GHCR_OWNER:-owner}/${GHCR_IMAGE:-mini-redis-cache}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: ["8080", "50000"]
    expose:
      - "8080"
    volumes:
      - ${CACHE_DATA_DIR:-/opt/mini-redis-cache/shared/cache-data}:/opt/mini-redis/data
    networks:
      - cache_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      cache_http:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${CERTBOT_CONF_DIR:-/opt/mini-redis-cache/shared/certbot/conf}:/etc/letsencrypt:ro
      - ${CERTBOT_WWW_DIR:-/opt/mini-redis-cache/shared/certbot/www}:/var/www/certbot:ro
    networks:
      - cache_net

networks:
  cache_net:
    driver: bridge
