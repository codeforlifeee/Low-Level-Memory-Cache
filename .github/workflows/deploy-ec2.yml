name: deploy-ec2

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-test-package:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Set image metadata
        id: meta
        run: |
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mini-redis-cache:${{ github.sha }}

      - name: Prepare deployment bundle
        run: |
          mkdir -p bundle
          cp docker-compose.yml bundle/
          cp -r deploy bundle/
          cat > bundle/.env <<EOF
          GHCR_OWNER=${{ github.repository_owner }}
          GHCR_IMAGE=mini-redis-cache
          IMAGE_TAG=${{ github.sha }}
          TLS_DOMAIN=${{ secrets.TLS_DOMAIN }}
          CERTBOT_CONF_DIR=/opt/mini-redis-cache/shared/certbot/conf
          CERTBOT_WWW_DIR=/opt/mini-redis-cache/shared/certbot/www
          EOF
          tar -czf mini-redis-release.tar.gz -C bundle .

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: mini-redis-release
          path: mini-redis-release.tar.gz

  deploy:
    runs-on: ubuntu-22.04
    needs: build-test-package
    environment: production

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: mini-redis-release

      - name: Preflight SSH reachability
        run: |
          EC2_PORT="${{ secrets.EC2_PORT != '' && secrets.EC2_PORT || '22' }}"
          RAW_HOST='${{ secrets.EC2_HOST }}'
          HOST="${RAW_HOST#http://}"
          HOST="${HOST#https://}"
          HOST="${HOST%%/*}"

          if [ -z "$HOST" ]; then
            echo "::error::EC2_HOST is empty or invalid. Use only IP/DNS (no protocol or path)."
            exit 1
          fi

          export HOST EC2_PORT
          python3 - <<'PY'
          import os
          import socket
          import sys

          host = os.environ["HOST"].strip()
          port = int(os.environ["EC2_PORT"])
          timeout_s = 8

          try:
              with socket.create_connection((host, port), timeout=timeout_s):
                  print(f"SSH port reachable on {host}:{port}")
          except Exception as exc:
              print(
                  f"::error::Cannot reach {host}:{port}. "
                  f"Check EC2 security group, NACL, host firewall, and EC2_HOST format. "
                  f"Details: {exc}"
              )
              sys.exit(1)
          PY

      - name: Copy bundle to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT != '' && secrets.EC2_PORT || '22' }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 120s
          source: mini-redis-release.tar.gz
          target: /tmp

      - name: Run deploy with rollback
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT != '' && secrets.EC2_PORT || '22' }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 120s
          command_timeout: 20m
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi
            sudo mkdir -p /opt/mini-redis-cache
            TMP_DIR="/tmp/mini-redis-ops"
            rm -rf "$TMP_DIR"
            mkdir -p "$TMP_DIR"
            tar -xzf /tmp/mini-redis-release.tar.gz -C "$TMP_DIR"
            chmod +x "$TMP_DIR/deploy/ec2/deploy.sh"
            sudo cp "$TMP_DIR/deploy/ec2/deploy.sh" /opt/mini-redis-cache/deploy.sh
            sudo chmod +x /opt/mini-redis-cache/deploy.sh
            HEALTH_URL="http://127.0.0.1/health" sudo /opt/mini-redis-cache/deploy.sh /tmp/mini-redis-release.tar.gz
      - name: Verify deployment endpoint
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT != '' && secrets.EC2_PORT || '22' }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 120s
          command_timeout: 2m
          script: |
            set -euo pipefail
            if curl -fsS http://127.0.0.1/health >/dev/null || \
               curl -fsS http://localhost/health >/dev/null || \
               curl -kfsS https://127.0.0.1/health >/dev/null || \
               curl -kfsS https://localhost/health >/dev/null; then
              echo "Post-deploy health verification passed"
              exit 0
            fi

            echo "Post-deploy health verification failed"
            cd /opt/mini-redis-cache/current
            docker compose ps || true
            docker compose logs --tail=120 nginx || true
            exit 1
