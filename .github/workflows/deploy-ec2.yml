name: deploy-ec2

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-test-package:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Set image metadata
        id: meta
        run: |
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mini-redis-cache:${{ github.sha }}

      - name: Prepare deployment bundle
        run: |
          mkdir -p bundle
          cp docker-compose.yml bundle/
          cp -r deploy bundle/
          cat > bundle/.env <<EOF
          GHCR_OWNER=${{ github.repository_owner }}
          GHCR_IMAGE=mini-redis-cache
          IMAGE_TAG=${{ github.sha }}
          EOF
          tar -czf mini-redis-release.tar.gz -C bundle .

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: mini-redis-release
          path: mini-redis-release.tar.gz

  deploy:
    runs-on: ubuntu-22.04
    needs: build-test-package
    environment: production

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: mini-redis-release

      - name: Copy bundle to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: mini-redis-release.tar.gz
          target: /tmp

      - name: Run deploy with rollback
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi
            mkdir -p /opt/mini-redis-cache
            if [ ! -x /opt/mini-redis-cache/deploy.sh ]; then
              mkdir -p /opt/mini-redis-cache
            fi
            TMP_DIR="/tmp/mini-redis-ops"
            rm -rf "$TMP_DIR"
            mkdir -p "$TMP_DIR"
            tar -xzf /tmp/mini-redis-release.tar.gz -C "$TMP_DIR"
            chmod +x "$TMP_DIR/deploy/ec2/deploy.sh"
            cp "$TMP_DIR/deploy/ec2/deploy.sh" /opt/mini-redis-cache/deploy.sh
            chmod +x /opt/mini-redis-cache/deploy.sh
            HEALTH_URL="http://127.0.0.1/health" /opt/mini-redis-cache/deploy.sh /tmp/mini-redis-release.tar.gz

      - name: Verify deployment endpoint
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            curl -fsS http://127.0.0.1/health
